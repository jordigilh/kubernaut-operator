apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kubernaut-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kubernaut-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        env:
        - name: RELATED_IMAGE_GATEWAY
          value: quay.io/kubernaut-ai/gateway@sha256:f03be2086f2c1ede805a6deaa165b25a50f577c6c999fa29fa26cc1c58627cc9
        - name: RELATED_IMAGE_DATA_STORAGE
          value: quay.io/kubernaut-ai/datastorage@sha256:68e7a7918dab03b51ac249766075685e6ff07b42bfb5ae28b1c2db8737335157
        - name: RELATED_IMAGE_AIANALYSIS
          value: quay.io/kubernaut-ai/aianalysis@sha256:db24036261c155f4bafe18b9c9cf78e32cbe7120dda86ed2a69e8fed0a781339
        - name: RELATED_IMAGE_SIGNALPROCESSING
          value: quay.io/kubernaut-ai/signalprocessing@sha256:2a2408b996405e74d9ee36f287761f74ee4a2b40b6c9a6bdb011d5851e34380b
        - name: RELATED_IMAGE_REMEDIATIONORCHESTRATOR
          value: quay.io/kubernaut-ai/remediationorchestrator@sha256:6cbc47747ac8bca13e9fd4aa368159e6605c3ef542fe8a1cbffc929914ed376a
        - name: RELATED_IMAGE_WORKFLOWEXECUTION
          value: quay.io/kubernaut-ai/workflowexecution@sha256:ed21a1a98b5aaec117c2cd1e9be206193f24cee2bdb2c1c9cced97df39fc2a43
        - name: RELATED_IMAGE_EFFECTIVENESSMONITOR
          value: quay.io/kubernaut-ai/effectivenessmonitor@sha256:cffd966efe2fa8cc023d844400a62c2f5786f54140850a9def68619bfcd1e33a
        - name: RELATED_IMAGE_NOTIFICATION
          value: quay.io/kubernaut-ai/notification@sha256:b94b833920a6111c0af359030aacd0095462aefab275247305708d8c28619483
        - name: RELATED_IMAGE_KUBERNAUT_AGENT
          value: quay.io/kubernaut-ai/kubernautagent@sha256:05a7503fc7e97575a1431a937fc4419f1e853f5bc78958e724ee9f6558d19a97
        - name: RELATED_IMAGE_AUTHWEBHOOK
          value: quay.io/kubernaut-ai/authwebhook@sha256:fbba6d3160f1b939fbf94935fd384b2febb38974d119ef07701f9b78065f5666
        - name: RELATED_IMAGE_API_FRONTEND
          value: quay.io/kubernaut-ai/apifrontend@sha256:abefd24a48f7c7fae3e0019d81d4b27c303668a91176c7861766da2b60a3d444
        - name: RELATED_IMAGE_DB_MIGRATE
          value: quay.io/kubernaut-ai/db-migrate@sha256:97a77668efc83a30618a02f3b875df24981be4e7310c3586671f5b66108a686f
        - name: RELATED_IMAGE_INIT_POSTGRES
          value: registry.redhat.io/rhel10/postgresql-16@sha256:6626034c7e8a171610212a220efd417eb5ab7792b5dbd912d38976ffe0627301
        - name: RELATED_IMAGE_INIT_UBI_MINIMAL
          value: registry.access.redhat.com/ubi10/ubi-minimal@sha256:2a4785f399dc7ae2f3ca85f68bac0ccac47f3e73464a47c21e4f7ae46b55a053
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
