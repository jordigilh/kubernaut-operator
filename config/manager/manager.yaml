apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kubernaut-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kubernaut-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        env:
        - name: RELATED_IMAGE_GATEWAY
          value: quay.io/kubernaut-ai/gateway@sha256:8b09bafdfd119424c93915703f347994e786b59a902028e8c51def51fda87ee3
        - name: RELATED_IMAGE_DATA_STORAGE
          value: quay.io/kubernaut-ai/datastorage@sha256:e07fa27f2c3e3f14ad96f33f89387d0fb735699a6cdd6b794065ca840eecb649
        - name: RELATED_IMAGE_AIANALYSIS
          value: quay.io/kubernaut-ai/aianalysis@sha256:ca6ccf69586f38915da7e340e714e2657171db93a9149cafeeebf4ca27e6a657
        - name: RELATED_IMAGE_SIGNALPROCESSING
          value: quay.io/kubernaut-ai/signalprocessing@sha256:4e770e3010529974a95653eabdf3a77c6e9c08ff7559e852ff3838d1279f4035
        - name: RELATED_IMAGE_REMEDIATIONORCHESTRATOR
          value: quay.io/kubernaut-ai/remediationorchestrator@sha256:129cc18a6374bc901a17de8d8bc650802443d311c8b4cb05245d6ae3f03dab53
        - name: RELATED_IMAGE_WORKFLOWEXECUTION
          value: quay.io/kubernaut-ai/workflowexecution@sha256:e9d8292719139cf845b26bfa5d8d4911af197aba853b7e69538061175063c3e0
        - name: RELATED_IMAGE_EFFECTIVENESSMONITOR
          value: quay.io/kubernaut-ai/effectivenessmonitor@sha256:c4e8278f163ef911b6b8f5c33586cfb0d34b067cc0ec4233a6a7cdf7cac147e3
        - name: RELATED_IMAGE_NOTIFICATION
          value: quay.io/kubernaut-ai/notification@sha256:52cd62fdf1db98131b806af8fcc9984e077427e46939568096b8da80da58ed7e
        - name: RELATED_IMAGE_KUBERNAUT_AGENT
          value: quay.io/kubernaut-ai/kubernautagent@sha256:6e44133517b7126cf24b44bf9332fde682f98b56d56b41ff26893062ab9c5105
        - name: RELATED_IMAGE_AUTHWEBHOOK
          value: quay.io/kubernaut-ai/authwebhook@sha256:dbc42f8a27331f0795b3bfb96ff13e1de73a2517801d7a7b5d6acedc36835ded
        - name: RELATED_IMAGE_API_FRONTEND
          value: quay.io/kubernaut-ai/apifrontend@sha256:4e60d1e5e88717f991c20739fee408cfc985e5ba072c3273d91dc9f805600e1b
        - name: RELATED_IMAGE_DB_MIGRATE
          value: quay.io/kubernaut-ai/db-migrate@sha256:b364243e5780dd8fbf19309ce5d17011b12edaba0e591e499e1c3a9e8df3576f
        - name: RELATED_IMAGE_CONSOLE
          value: quay.io/kubernaut-ai/kubernaut-console@sha256:01300d335dece46e8dab7a5722e6c52a85a564886f2934dcf4719d3fc363317c
        - name: RELATED_IMAGE_OAUTH2_PROXY
          value: quay.io/oauth2-proxy/oauth2-proxy@sha256:37c1570c0427e02fc7c947ef2c04e8995b8347b7abc9fcf1dbb4e376a4b221a7
        - name: RELATED_IMAGE_INIT_POSTGRES
          value: registry.redhat.io/rhel10/postgresql-16@sha256:877ac0f8207ada1559ef73b70e92616255b95d3b6ef6a1af314c0f67edfde96e
        - name: RELATED_IMAGE_INIT_UBI_MINIMAL
          value: registry.access.redhat.com/ubi10/ubi-minimal@sha256:7dc60d7777e010c50f5e041ff069112b379c3d5eef2823d20871c67cf663f10c
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
