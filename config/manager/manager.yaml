apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kubernaut-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kubernaut-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        env:
        - name: RELATED_IMAGE_GATEWAY
          value: quay.io/kubernaut-ai/gateway@sha256:5ee285df02d0ee1a8e2368f9a6b847e8e14c776c3b785113a20d98af8609e38f
        - name: RELATED_IMAGE_DATA_STORAGE
          value: quay.io/kubernaut-ai/datastorage@sha256:e6ea8b9e2c39fc9658123481dc43265d3743c4e9d822a65e9684d9bf2743c287
        - name: RELATED_IMAGE_AIANALYSIS
          value: quay.io/kubernaut-ai/aianalysis@sha256:03259d348f03e088b6b8b1735808e6aa4af7837fa0fb102ede71da926ebf45c9
        - name: RELATED_IMAGE_SIGNALPROCESSING
          value: quay.io/kubernaut-ai/signalprocessing@sha256:4662ae12a9338c17735421a77b1c586fff9b946fc05fa58d52521392a77dac2c
        - name: RELATED_IMAGE_REMEDIATIONORCHESTRATOR
          value: quay.io/kubernaut-ai/remediationorchestrator@sha256:620f470b43cc520f90014fc7cb527832c02a07b577c3a74269c6c2666de3e776
        - name: RELATED_IMAGE_WORKFLOWEXECUTION
          value: quay.io/kubernaut-ai/workflowexecution@sha256:1b2891a38309fedfa9d7c5689aa9f0fc0043694180d1cf7922249dd320eb5589
        - name: RELATED_IMAGE_EFFECTIVENESSMONITOR
          value: quay.io/kubernaut-ai/effectivenessmonitor@sha256:cc4d4c6a1fcd36580142338a8ee3d7c78b464856037965009e13beccf2633d34
        - name: RELATED_IMAGE_NOTIFICATION
          value: quay.io/kubernaut-ai/notification@sha256:16b2892247c1d3997d1c2d153f200a00c07df491b1bca95b03da16f9e4a93de4
        - name: RELATED_IMAGE_KUBERNAUT_AGENT
          value: quay.io/kubernaut-ai/kubernautagent@sha256:72237cf19f3f179843538e156b73e12bd00cf6a3d8e0579bc8e7994ae99e6049
        - name: RELATED_IMAGE_AUTHWEBHOOK
          value: quay.io/kubernaut-ai/authwebhook@sha256:2631a391574f23867566db700d78980df241dee077d48b05e70eb17d8310da8b
        - name: RELATED_IMAGE_API_FRONTEND
          value: quay.io/kubernaut-ai/apifrontend@sha256:51be3e21d943f9cfe84f9084b1b18329c0dbb94bd63ec49281a372ff906e8668
        - name: RELATED_IMAGE_DB_MIGRATE
          value: quay.io/kubernaut-ai/db-migrate@sha256:3540b78b671fb894301d32de67984f54b5707635bdb58e323dc3387b35f2aa24
        - name: RELATED_IMAGE_CONSOLE
          value: quay.io/kubernaut-ai/kubernaut-console@sha256:01300d335dece46e8dab7a5722e6c52a85a564886f2934dcf4719d3fc363317c
        - name: RELATED_IMAGE_OAUTH2_PROXY
          value: quay.io/oauth2-proxy/oauth2-proxy@sha256:37c1570c0427e02fc7c947ef2c04e8995b8347b7abc9fcf1dbb4e376a4b221a7
        - name: RELATED_IMAGE_INIT_POSTGRES
          value: registry.redhat.io/rhel10/postgresql-16@sha256:877ac0f8207ada1559ef73b70e92616255b95d3b6ef6a1af314c0f67edfde96e
        - name: RELATED_IMAGE_INIT_UBI_MINIMAL
          value: registry.access.redhat.com/ubi10/ubi-minimal@sha256:7dc60d7777e010c50f5e041ff069112b379c3d5eef2823d20871c67cf663f10c
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
