apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kubernaut-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kubernaut-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        env:
        - name: RELATED_IMAGE_GATEWAY
          value: ghcr.io/jordigilh/kubernaut/gateway@sha256:8502d2633b9d839b1c82347edf2fffe88afe21b04c4be6908df695da9946e114
        - name: RELATED_IMAGE_DATA_STORAGE
          value: ghcr.io/jordigilh/kubernaut/datastorage@sha256:7e2a81854b55a87c274c9edd2bacca8b229832e502bff6abbffeb3870b11d857
        - name: RELATED_IMAGE_AIANALYSIS
          value: ghcr.io/jordigilh/kubernaut/aianalysis@sha256:b0fe33dd4ded433ce67da441a3a741bcb72219ffe6fd0dfc6977c57c88786f9c
        - name: RELATED_IMAGE_SIGNALPROCESSING
          value: ghcr.io/jordigilh/kubernaut/signalprocessing@sha256:8e2b027e69f7597c0636d74564be2314cba96a1141a141d53b2d4842aef80437
        - name: RELATED_IMAGE_REMEDIATIONORCHESTRATOR
          value: ghcr.io/jordigilh/kubernaut/remediationorchestrator@sha256:e78c06f22516c9082b333e921a81aa19f6909bf68f9381468595eff5f09e7c73
        - name: RELATED_IMAGE_WORKFLOWEXECUTION
          value: ghcr.io/jordigilh/kubernaut/workflowexecution@sha256:56970ebdcc7a224fcb850f26ca50eedf986c2868d3c5d35b1764fdace7a53f73
        - name: RELATED_IMAGE_EFFECTIVENESSMONITOR
          value: ghcr.io/jordigilh/kubernaut/effectivenessmonitor@sha256:bb1cf35ca27e9de8d10177298ce08d303867177f1c43b05df28f6a1afdbeb247
        - name: RELATED_IMAGE_NOTIFICATION
          value: ghcr.io/jordigilh/kubernaut/notification@sha256:68fad85625ffc098e3eae45ee43e309f0ab74f1c1515d1d885acaf6e90653029
        - name: RELATED_IMAGE_KUBERNAUT_AGENT
          value: ghcr.io/jordigilh/kubernaut/kubernautagent@sha256:365855eec213199aa0fd2888b88699f3f74a1b6444371284b37694ac4629f72b
        - name: RELATED_IMAGE_AUTHWEBHOOK
          value: ghcr.io/jordigilh/kubernaut/authwebhook@sha256:163cfefd501f7f0a3958b8692b31a95474a936ac19d738f0e002d6bd62973d61
        - name: RELATED_IMAGE_API_FRONTEND
          value: ghcr.io/jordigilh/kubernaut/apifrontend@sha256:fe30498d7c6921411392ce204c6953874bc9d848737d78333c593801bffae685
        - name: RELATED_IMAGE_DB_MIGRATE
          value: ghcr.io/jordigilh/kubernaut/db-migrate@sha256:0fff0881bb6ed41648b0cdddac6e05fe592e41425fdd494308c852c5a5c8ca6d
        - name: RELATED_IMAGE_INIT_POSTGRES
          value: registry.redhat.io/rhel10/postgresql-16@sha256:6626034c7e8a171610212a220efd417eb5ab7792b5dbd912d38976ffe0627301
        - name: RELATED_IMAGE_INIT_UBI_MINIMAL
          value: registry.access.redhat.com/ubi10/ubi-minimal@sha256:2a4785f399dc7ae2f3ca85f68bac0ccac47f3e73464a47c21e4f7ae46b55a053
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
