apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kubernaut-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kubernaut-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        env:
        - name: RELATED_IMAGE_GATEWAY
          value: ghcr.io/jordigilh/kubernaut/gateway@sha256:7b79e3b24065af2dfe96ac35b89c39fd276536cd058c921e1f4d571c1c128581
        - name: RELATED_IMAGE_DATA_STORAGE
          value: ghcr.io/jordigilh/kubernaut/datastorage@sha256:d0c72785f5407275916a5016a3f7b94144410a8cc73a965f3a61898a0894e4c7
        - name: RELATED_IMAGE_AIANALYSIS
          value: ghcr.io/jordigilh/kubernaut/aianalysis@sha256:985ee167dffa224e654836df9c8ff494e18271cd39f678f4c26dc0d146c96dd3
        - name: RELATED_IMAGE_SIGNALPROCESSING
          value: ghcr.io/jordigilh/kubernaut/signalprocessing@sha256:32013ba9e99da8781145ed72a9afa4a7e51e9e38bb3383a2aba24821a493c935
        - name: RELATED_IMAGE_REMEDIATIONORCHESTRATOR
          value: ghcr.io/jordigilh/kubernaut/remediationorchestrator@sha256:b40b9dd25fc561300e8093bc0c4e13fd06a8b7e8eff96cd1a7edca00ade3eddd
        - name: RELATED_IMAGE_WORKFLOWEXECUTION
          value: ghcr.io/jordigilh/kubernaut/workflowexecution@sha256:5e36d1e021e8364623b08bd73e34fe57fc30a4eddcbe439c357371dc48cb894f
        - name: RELATED_IMAGE_EFFECTIVENESSMONITOR
          value: ghcr.io/jordigilh/kubernaut/effectivenessmonitor@sha256:1d30e493c1f72060aa83c926cad7adde5369153087858cf550abae4bdf1590ad
        - name: RELATED_IMAGE_NOTIFICATION
          value: ghcr.io/jordigilh/kubernaut/notification@sha256:a717c225838d0c6eb873aceff52cec6fa550ec3f700050e19aa0ece9994e695b
        - name: RELATED_IMAGE_KUBERNAUT_AGENT
          value: ghcr.io/jordigilh/kubernaut/kubernautagent@sha256:1e3b2dae1c39a1e1da8fd532f06afc586ca8bcd32808301235adf8e268ca1d1f
        - name: RELATED_IMAGE_AUTHWEBHOOK
          value: ghcr.io/jordigilh/kubernaut/authwebhook@sha256:5e7d417a7a5ac8c9526f30e7efd8d9e7f17479ccd5e554324ff1fd3703a63a6a
        - name: RELATED_IMAGE_API_FRONTEND
          value: ghcr.io/jordigilh/kubernaut/apifrontend@sha256:ccb9b6b968b5bf5b13b49a513ce0214df0d09d7710669f1742516857627f068f
        - name: RELATED_IMAGE_DB_MIGRATE
          value: ghcr.io/jordigilh/kubernaut/db-migrate@sha256:e947ff4876e6b011d6ea6f3c646847b38a4c05d425146a8214127de245850d0f
        - name: RELATED_IMAGE_INIT_POSTGRES
          value: registry.redhat.io/rhel10/postgresql-16@sha256:6626034c7e8a171610212a220efd417eb5ab7792b5dbd912d38976ffe0627301
        - name: RELATED_IMAGE_INIT_UBI_MINIMAL
          value: registry.access.redhat.com/ubi10/ubi-minimal@sha256:2a4785f399dc7ae2f3ca85f68bac0ccac47f3e73464a47c21e4f7ae46b55a053
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
