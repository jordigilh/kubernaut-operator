apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubernaut-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kubernaut-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kubernaut-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        env:
        - name: RELATED_IMAGE_GATEWAY
          value: ghcr.io/jordigilh/kubernaut/gateway@sha256:53abb2edb638088899aba61204efe06081065d18367a34a0fe24a43f9f26926e
        - name: RELATED_IMAGE_DATA_STORAGE
          value: ghcr.io/jordigilh/kubernaut/datastorage@sha256:936e066b40c6d9b48e73c2d9ddf5e6790df981201094bd6d117dedc772dd36b5
        - name: RELATED_IMAGE_AIANALYSIS
          value: ghcr.io/jordigilh/kubernaut/aianalysis@sha256:a073434572c65a178eb5e964325f261bd57d2b1f3ad5b5a137ad2ce50080a45e
        - name: RELATED_IMAGE_SIGNALPROCESSING
          value: ghcr.io/jordigilh/kubernaut/signalprocessing@sha256:974d10416cfcb04c957a1c73581fe2030246435742cb91cfd8fb76bb81f09f1a
        - name: RELATED_IMAGE_REMEDIATIONORCHESTRATOR
          value: ghcr.io/jordigilh/kubernaut/remediationorchestrator@sha256:9760c973c7509eb26f46a28f9ded015f2a6271f9caf3ffefcd30b53716daa569
        - name: RELATED_IMAGE_WORKFLOWEXECUTION
          value: ghcr.io/jordigilh/kubernaut/workflowexecution@sha256:4ba3cbe0cfdbe0d9b6f3d73652b78eeeea14aa0c1207e81cb5298d8ef9422f51
        - name: RELATED_IMAGE_EFFECTIVENESSMONITOR
          value: ghcr.io/jordigilh/kubernaut/effectivenessmonitor@sha256:f74d6d96db0715c1d4224fa2ac035f66cc3bdd0cf65b2ccd65542cf0acd90196
        - name: RELATED_IMAGE_NOTIFICATION
          value: ghcr.io/jordigilh/kubernaut/notification@sha256:d8276a31130bca154fca06c0b6cd36a225f4021f5012a394e8e0d84667e27f57
        - name: RELATED_IMAGE_KUBERNAUT_AGENT
          value: ghcr.io/jordigilh/kubernaut/kubernautagent@sha256:a4028071a99cdbdd628f96db339828bb61cba4b7d30fa263bbf6a8611092b34d
        - name: RELATED_IMAGE_AUTHWEBHOOK
          value: ghcr.io/jordigilh/kubernaut/authwebhook@sha256:7be0654155c7e1b3c38ed6a0b513c041d0c5c259ffdaf89d4e4c4b9d65f92016
        - name: RELATED_IMAGE_API_FRONTEND
          value: ghcr.io/jordigilh/kubernaut/apifrontend@sha256:08b7f871b66b77c7b2933521a7290580f58f68d727384a5c5a87bbf0fd3bd22a
        - name: RELATED_IMAGE_DB_MIGRATE
          value: ghcr.io/jordigilh/kubernaut/db-migrate@sha256:16ec2707a0e9a60f180ff46cd1ba5ab62fbb4dc7e6a3a3558a16f0271871198a
        - name: RELATED_IMAGE_INIT_POSTGRES
          value: registry.redhat.io/rhel10/postgresql-16@sha256:6626034c7e8a171610212a220efd417eb5ab7792b5dbd912d38976ffe0627301
        - name: RELATED_IMAGE_INIT_UBI_MINIMAL
          value: registry.access.redhat.com/ubi10/ubi-minimal@sha256:2a4785f399dc7ae2f3ca85f68bac0ccac47f3e73464a47c21e4f7ae46b55a053
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
