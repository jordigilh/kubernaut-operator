name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      ocp_server:
        description: "OCP API server URL (e.g. https://api.cluster.example.com:6443)"
        required: true
        type: string
      operator_image:
        description: "Operator image to test (e.g. quay.io/kubernaut-ai/kubernaut-operator:v1.3.0)"
        required: true
        type: string
        default: "quay.io/kubernaut-ai/kubernaut-operator:v1.3.0"

permissions:
  contents: read

jobs:
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install oc CLI
        run: |
          curl -sSL "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz" \
            | tar xz -C /usr/local/bin oc kubectl

      - name: Login to OCP
        run: |
          oc login --token="${{ secrets.OCP_TOKEN }}" \
                   --server="${{ inputs.ocp_server }}" \
                   --insecure-skip-tls-verify

      - name: Run E2E tests
        run: make test-e2e
        env:
          IMG: ${{ inputs.operator_image }}
