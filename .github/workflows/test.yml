name: Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sbom-scan:
    name: SBOM and Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build image
        run: docker build -t kubernaut-operator:ci .

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.20.0

      - name: Generate SBOM
        run: syft packages kubernaut-operator:ci -o cyclonedx-json > sbom.cdx.json

      - name: Install Trivy
        run: curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.70.0

      - name: Scan image
        run: trivy image --severity CRITICAL,HIGH,MEDIUM --exit-code 1 --ignorefile .trivyignore kubernaut-operator:ci

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Shellcheck hack/ scripts
        run: shellcheck hack/migrate-llm-profile.sh hack/migrate-llm-profile.test.sh

      - name: Run hack/ script tests
        run: make test-hack-scripts

      - name: Check coverage threshold
        run: |
          # cover.out is produced by `make test` (Makefile: -coverprofile cover.out)
          grep 'internal/' cover.out > cover-internal.out || true
          echo "mode: set" | cat - cover-internal.out > cover-internal-final.out
          COVERAGE=$(go tool cover -func=cover-internal-final.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Internal package coverage: ${COVERAGE}%"
          THRESHOLD=80
          if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Internal coverage ${COVERAGE}% is below the ${THRESHOLD}% threshold"
            exit 1
          fi
