name: Lint

on:
  pull_request:
    branches: [main, 'release/**']
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, 'release/**']

permissions:
  contents: read

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
