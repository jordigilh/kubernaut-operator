name: Release

# Triggered by version tag push (e.g., v1.4.0, v1.5.0-rc1)
# Builds multi-arch operator image (amd64 + arm64), creates manifest list,
# builds and pushes the OLM bundle image, and creates a GitHub Release.
# Pre-release tags (-rc*, -alpha*, -beta*) create a pre-release and skip :latest tagging.
#
# Prerequisites:
#   - Quay.io robot account with push access to kubernaut-ai org
#   - GitHub Actions secrets: QUAY_ROBOT_USERNAME, QUAY_ROBOT_TOKEN

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  IMAGE_REGISTRY: quay.io/kubernaut-ai
  IMAGE_NAME: kubernaut-operator

jobs:
  # ========================================
  # STAGE 0: PREPARE
  # ========================================

  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      build_date: ${{ steps.version.outputs.build_date }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

          if [[ "$VERSION" =~ -(rc|alpha|beta) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "Pre-release: $TAG (version: $VERSION)"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "Release: $TAG (version: $VERSION)"
          fi

  # ========================================
  # STAGE 1a: BUILD & PUSH amd64 IMAGE
  # Standard podman build using the multi-stage Dockerfile.
  # ========================================

  build-amd64:
    name: Build Operator (amd64)
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-amd64"
          echo "Building ${IMAGE}..."
          podman build \
            --platform linux/amd64 \
            --build-arg TARGETOS=linux \
            --build-arg TARGETARCH=amd64 \
            --build-arg VERSION="${VERSION}" \
            --build-arg GIT_COMMIT="${GIT_COMMIT}" \
            -t "${IMAGE}" .

      - name: Push image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-amd64"
          echo "Pushing ${IMAGE}..."
          podman push "${IMAGE}"

  # ========================================
  # SBOM (amd64 image) + Cosign SBOM attestation
  # ========================================

  sbom:
    name: Generate SBOM and attest
    needs: [prepare, build-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Login to Quay.io (podman)
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Login to Quay.io (docker credentials)
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_ROBOT_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          podman pull "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-amd64"
          syft packages "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-amd64" -o cyclonedx-json > sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ needs.prepare.outputs.version }}
          path: sbom.cdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62

      - name: Attest SBOM
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-amd64"

  # ========================================
  # STAGE 1b: BUILD & PUSH arm64 IMAGE
  # Cross-compiles the Go binary natively on the amd64 runner (no QEMU),
  # then packages it with Dockerfile.runtime.
  # ========================================

  build-arm64:
    name: Build Operator (arm64)
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cross-compile binary (native, no QEMU)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          echo "Cross-compiling manager for arm64..."
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -a \
            -ldflags "-s -w -X main.Version=${VERSION} -X main.GitCommit=${GIT_COMMIT}" \
            -o manager-arm64 cmd/main.go
          ls -lh manager-arm64

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build runtime image (no QEMU)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-arm64"
          echo "Building ${IMAGE}..."
          podman build \
            --platform linux/arm64 \
            -f Dockerfile.runtime \
            --build-arg BINARY=manager-arm64 \
            -t "${IMAGE}" .

      - name: Push image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-arm64"
          echo "Pushing ${IMAGE}..."
          podman push "${IMAGE}"

  # ========================================
  # STAGE 2: MULTI-ARCH MANIFESTS
  # Creates a manifest list so a single tag (e.g., 1.4.0) resolves
  # to the correct architecture automatically.
  # Also tags :latest for GA releases.
  # ========================================

  create-manifests:
    name: Create Multi-Arch Manifests
    needs: [prepare, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Create and push version manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          MANIFEST="${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}"
          echo "Creating manifest ${MANIFEST}..."
          podman manifest rm "${MANIFEST}" 2>/dev/null || true
          podman manifest create "${MANIFEST}" \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-amd64" \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-arm64"
          podman manifest push "${MANIFEST}" "docker://${MANIFEST}"
          echo "Pushed ${MANIFEST}"

      - name: Tag as latest
        if: needs.prepare.outputs.is_prerelease == 'false'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          LATEST="${IMAGE_REGISTRY}/${IMAGE_NAME}:latest"
          echo "Tagging ${LATEST}..."
          podman manifest rm "${LATEST}" 2>/dev/null || true
          podman manifest create "${LATEST}" \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-amd64" \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-arm64"
          podman manifest push "${LATEST}" "docker://${LATEST}"
          echo "Pushed ${LATEST}"

  # ========================================
  # Cosign sign multi-arch manifest (keyless)
  # ========================================

  sign:
    name: Sign container images
    needs: [prepare, create-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_ROBOT_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Sign version manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cosign sign --yes "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}"

      - name: Sign latest manifest
        if: needs.prepare.outputs.is_prerelease == 'false'
        run: |
          cosign sign --yes "${IMAGE_REGISTRY}/${IMAGE_NAME}:latest"

      - name: Verify signature
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="^https://github.com/jordigilh/kubernaut-operator/.github/workflows/release.yml@refs/tags/" \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}"

  # ========================================
  # SLSA build provenance (per-arch digest)
  # ========================================

  provenance:
    name: Attest build provenance
    needs: [prepare, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Quay.io (podman)
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Login to Quay.io (docker credentials)
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_ROBOT_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Pull amd64 image and get digest
        id: amd64-digest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          podman pull "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-amd64"
          DIGEST=$(podman inspect --format='{{.Digest}}' "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-amd64")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest amd64 provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.amd64-digest.outputs.digest }}
          push-to-registry: true

      - name: Pull arm64 image and get digest
        id: arm64-digest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          podman pull "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-arm64"
          DIGEST=$(podman inspect --format='{{.Digest}}' "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}-arm64")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest arm64 provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.arm64-digest.outputs.digest }}
          push-to-registry: true

  # ========================================
  # STAGE 3: OLM BUNDLE IMAGE
  # Builds and pushes the operator bundle image used by OLM / OperatorHub.
  # The bundle version matches the release version.
  # ========================================

  bundle:
    name: Build & Push OLM Bundle
    needs: [prepare, create-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Regenerate bundle with release version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          IMG="${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}" \
            VERSION="${VERSION}" \
            make bundle

      - name: Build bundle image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          BUNDLE_IMG="${IMAGE_REGISTRY}/${IMAGE_NAME}-bundle:v${VERSION}"
          echo "Building bundle image ${BUNDLE_IMG}..."
          podman build -f bundle.Dockerfile -t "${BUNDLE_IMG}" .

      - name: Push bundle image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          BUNDLE_IMG="${IMAGE_REGISTRY}/${IMAGE_NAME}-bundle:v${VERSION}"
          echo "Pushing ${BUNDLE_IMG}..."
          podman push "${BUNDLE_IMG}"

  # ========================================
  # STAGE 3b: OLM CATALOG IMAGE
  # Builds a file-based catalog (FBC) containing the bundle and pushes it.
  # This catalog can be referenced by a CatalogSource on OCP clusters.
  # ========================================

  catalog:
    name: Build & Push OLM Catalog
    needs: [prepare, bundle]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build and push catalog image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          BUNDLE_IMGS="${IMAGE_REGISTRY}/${IMAGE_NAME}-bundle:v${VERSION}" \
            CATALOG_IMG="${IMAGE_REGISTRY}/${IMAGE_NAME}-catalog:v${VERSION}" \
            CONTAINER_TOOL=podman \
            make catalog-build catalog-push

  # ========================================
  # STAGE 4: GITHUB RELEASE
  # Creates a GitHub Release with auto-generated notes.
  # ========================================

  release:
    name: Create GitHub Release
    needs: [prepare, create-manifests, bundle, catalog, sbom, sign, provenance]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ needs.prepare.outputs.version }}
          path: .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${TAG}" sbom.cdx.json \
            --title "Kubernaut Operator ${TAG}" \
            --generate-notes \
            ${PRERELEASE_FLAG} \
            --notes-start-tag "$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')" || \
          gh release create "${TAG}" sbom.cdx.json \
            --title "Kubernaut Operator ${TAG}" \
            --generate-notes \
            ${PRERELEASE_FLAG}

          echo ""
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          echo ""
          echo "Images:"
          echo "  Operator: ${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}"
          echo "  Bundle:   ${IMAGE_REGISTRY}/${IMAGE_NAME}-bundle:v${VERSION}"
